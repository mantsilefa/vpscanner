<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00d4ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VP Scanner">
<meta name="mobile-web-app-capable" content="yes">
<title>VP Scanner</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c0f;--s:#111318;--s2:#181c23;--b:#1e2530;
  --ac:#00d4ff;--gr:#00e676;--rd:#ff3d57;--yl:#f0a500;
  --tx:#e8edf5;--mu:#5a6478;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'IBM Plex Sans',sans-serif}

/* APP SHELL */
.app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}

/* TOP BAR */
.topbar{background:var(--s2);border-bottom:1px solid var(--b);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--ac);text-shadow:0 0 20px rgba(0,212,255,.4)}
.topbar-right{display:flex;align-items:center;gap:10px}
.live-pill{display:flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:10px;padding:4px 10px;border-radius:20px;border:1px solid}
.live-pill.ok{color:var(--gr);border-color:rgba(0,230,118,.3);background:rgba(0,230,118,.08)}
.live-pill.err{color:var(--rd);border-color:rgba(255,61,87,.3);background:rgba(255,61,87,.08)}
.live-pill.wait{color:var(--mu);border-color:var(--b);background:transparent}
.live-pill.fetch{color:var(--yl);border-color:rgba(240,165,0,.3);background:rgba(240,165,0,.08)}
.ldot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.scan-fab{background:var(--ac);color:var(--bg);border:none;padding:8px 16px;border-radius:20px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:1px;cursor:pointer;text-transform:uppercase}

/* SESSION TABS */
.sess-tabs{display:flex;background:var(--s);border-bottom:1px solid var(--b);flex-shrink:0}
.sess-tab{flex:1;padding:10px 4px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.sess-tab.on{color:var(--ac);border-bottom-color:var(--ac);background:rgba(0,212,255,.05)}

/* SUMMARY BAR */
.sumbar{display:grid;grid-template-columns:repeat(4,1fr);background:var(--s);border-bottom:1px solid var(--b);flex-shrink:0}
.sumitem{padding:8px 4px;text-align:center;border-right:1px solid var(--b)}
.sumitem:last-child{border-right:none}
.sum-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--mu);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.sum-val{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1}
.sum-val.c1{color:var(--ac)}.sum-val.c2{color:var(--gr)}.sum-val.c3{color:var(--rd)}.sum-val.c4{color:var(--yl)}

/* SCROLL AREA */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px calc(var(--safe-bot) + 70px)}

/* BOTTOM NAV */
.botnav{position:fixed;bottom:0;left:0;right:0;padding-bottom:var(--safe-bot);background:var(--s2);border-top:1px solid var(--b);display:flex;z-index:100}
.botnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;cursor:pointer;color:var(--mu);transition:all .2s;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.5px;text-transform:uppercase;gap:4px;border:none;background:none}
.botnav-item.on{color:var(--ac)}
.botnav-icon{font-size:18px;line-height:1}

/* CARDS */
.card{background:var(--s);border:1px solid var(--b);border-radius:12px;margin-bottom:12px;overflow:hidden;transition:all .2s}
.card.sh{border-left:3px solid var(--gr)}.card.sm{border-left:3px solid var(--yl)}.card.sl{border-left:3px solid var(--rd)}
.card.ps{border-color:rgba(240,165,0,.3)}

/* CARD HEADER */
.chdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--s2)}
.cname{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
.cfull{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mu);margin-top:1px}
.stk{background:rgba(240,165,0,.15);color:var(--yl);font-family:'IBM Plex Mono',monospace;font-size:8px;padding:2px 6px;border-radius:3px;letter-spacing:1px;margin-left:5px;display:inline-block}
.ring{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;border:2px solid;flex-shrink:0}
.ring.h{border-color:var(--gr);color:var(--gr);background:rgba(0,230,118,.08)}
.ring.m{border-color:var(--yl);color:var(--yl);background:rgba(240,165,0,.08)}
.ring.l{border-color:var(--rd);color:var(--rd);background:rgba(255,61,87,.08)}
.rlbl{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--mu);text-align:center;margin-top:2px}
.btg{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;text-transform:uppercase;margin-top:4px}
.btg.bearish{background:rgba(255,61,87,.12);color:var(--rd);border:1px solid rgba(255,61,87,.2)}
.btg.bullish{background:rgba(0,230,118,.12);color:var(--gr);border:1px solid rgba(0,230,118,.2)}
.btg.neutral{background:rgba(90,100,120,.15);color:var(--mu);border:1px solid var(--b)}

/* LIVE PRICE */
.pstrip{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(0,212,255,.03);border-bottom:1px solid var(--b);border-top:1px solid var(--b)}
.plbl{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--mu);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.pval{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;transition:color .3s;letter-spacing:1px}
.pval.up{color:var(--gr)}.pval.dn{color:var(--rd)}.pval.na{color:var(--mu)}
.pchg{font-family:'IBM Plex Mono',monospace;font-size:10px}
.pchg.up{color:var(--gr)}.pchg.dn{color:var(--rd)}
.pmeta{text-align:right}
.pupt{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--mu);margin-bottom:3px}
.psrc{font-family:'IBM Plex Mono',monospace;font-size:8px;padding:2px 6px;border-radius:3px;display:inline-block}
.psrc.live{background:rgba(0,230,118,.1);color:var(--gr);border:1px solid rgba(0,230,118,.2)}
.psrc.man{background:rgba(90,100,120,.15);color:var(--mu);border:1px solid var(--b)}
@keyframes flash{0%{opacity:.1}100%{opacity:1}}
.pfl{animation:flash .5s ease}

/* DIST BARS */
.dsec{padding:10px 14px;border-bottom:1px solid var(--b)}
.drow{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.drow:last-child{margin-bottom:0}
.dlbl{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--mu);width:60px;flex-shrink:0;letter-spacing:1px;text-transform:uppercase}
.dbar{flex:1;height:4px;background:var(--b);border-radius:2px;overflow:hidden}
.dfill{height:100%;border-radius:2px;transition:width .6s}
.dval{font-family:'IBM Plex Mono',monospace;font-size:9px;width:42px;text-align:right;flex-shrink:0}

/* SCORE BAR */
.scbsec{padding:8px 14px;border-bottom:1px solid var(--b)}
.scblbl{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mu);margin-bottom:4px;letter-spacing:1px;text-transform:uppercase}
.scbar{height:3px;background:var(--b);border-radius:2px;overflow:hidden}
.scfill{height:100%;border-radius:2px;transition:width .5s}

/* COLLAPSIBLE LEVELS */
.levsec{border-bottom:1px solid var(--b)}
.lev-toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;background:none;border:none;width:100%;color:var(--tx)}
.lev-toggle-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mu);letter-spacing:2px;text-transform:uppercase}
.lev-toggle-icon{font-size:14px;color:var(--mu);transition:transform .2s}
.lev-toggle-icon.open{transform:rotate(180deg)}
.lev-body{padding:0 14px 12px;display:none}
.lev-body.open{display:block}
.levg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.levg3{grid-template-columns:1fr 1fr 1fr}
.levgp{display:flex;flex-direction:column;gap:3px}
.levlbl{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--mu);letter-spacing:1px;text-transform:uppercase}
.levinp{background:var(--bg);border:1px solid var(--b);border-radius:6px;padding:8px 10px;color:var(--tx);font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;width:100%;outline:none;transition:all .2s;-webkit-appearance:none}
.levinp:focus{border-color:var(--ac);box-shadow:0 0 0 2px rgba(0,212,255,.1)}
.levinp.poc{border-color:rgba(0,212,255,.4);color:var(--ac)}
.levinp.mow{border-color:rgba(255,61,87,.4);color:var(--rd)}
.levinp.asn{border-color:rgba(240,165,0,.4);color:var(--yl)}
.levinp.prc{border-color:rgba(0,230,118,.4);color:var(--gr)}

/* CHECKS */
.chksec{padding:10px 14px;border-bottom:1px solid var(--b);display:flex;flex-direction:column;gap:5px}
.chkrow{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--bg);border-radius:6px}
.chklbl{font-family:'IBM Plex Sans',sans-serif;font-size:11px;color:var(--mu);display:flex;align-items:center;gap:6px}
.chkdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.chkr{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600}
.chkr.pass{color:var(--gr)}.chkr.fail{color:var(--rd)}.chkr.nt{color:var(--mu)}.chkr.stk{color:var(--yl)}

/* SETUP BOX */
.setbox{margin:10px 14px;padding:12px;border-radius:8px;border-left:3px solid}
.setbox.short{background:rgba(255,61,87,.06);border-color:var(--rd)}
.setbox.long{background:rgba(0,230,118,.06);border-color:var(--gr)}
.setbox.wait{background:rgba(90,100,120,.08);border-color:var(--mu)}
.settype{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.setbox.short .settype{color:var(--rd)}.setbox.long .settype{color:var(--gr)}.setbox.wait .settype{color:var(--mu)}
.setdet{font-size:12px;color:var(--tx);line-height:1.6;margin-bottom:8px}
.setlevs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.slv{display:flex;flex-direction:column;gap:2px;background:rgba(0,0,0,.2);padding:6px 4px;border-radius:5px;text-align:center}
.slvn{font-family:'IBM Plex Mono',monospace;font-size:7px;color:var(--mu);letter-spacing:.5px;text-transform:uppercase}
.slvv{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600}

.rcalc{width:calc(100% - 28px);margin:0 14px 12px;padding:10px;background:transparent;border:1px solid var(--b);border-radius:8px;color:var(--ac);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s}

/* RANK VIEW */
.rank-card{background:var(--s);border:1px solid var(--b);border-radius:12px;margin-bottom:10px;overflow:hidden}
.rank-row{display:flex;align-items:center;padding:14px;gap:12px;border-bottom:1px solid var(--b)}
.rank-row:last-child{border-bottom:none}
.rnum{font-family:'Bebas Neue',sans-serif;font-size:28px;width:32px;flex-shrink:0;text-align:center}
.rnum.g{color:#FFD700}.rnum.s{color:#C0C0C0}.rnum.b{color:#CD7F32}.rnum.x{color:var(--mu)}
.rank-info{flex:1}
.rank-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px}
.rank-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mu);margin-top:2px}
.rank-right{text-align:right}
.rank-score{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1}
.rank-pri{font-family:'IBM Plex Mono',monospace;font-size:9px;margin-top:2px}

/* INPUT VIEW */
.input-view{padding:12px}
.input-section{background:var(--s);border:1px solid var(--b);border-radius:12px;margin-bottom:12px;overflow:hidden}
.input-hdr{padding:12px 14px;background:var(--s2);border-bottom:1px solid var(--b);font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--ac)}
.input-body{padding:14px}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.input-row.three{grid-template-columns:1fr 1fr 1fr}

/* INSTALL BANNER */
.install-banner{background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(0,212,255,.05));border:1px solid rgba(0,212,255,.3);border-radius:12px;padding:14px;margin-bottom:12px;display:none}
.install-banner.show{display:block}
.install-title{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ac);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.install-text{font-size:12px;color:var(--mu);line-height:1.6;margin-bottom:10px}
.install-btn{background:var(--ac);color:var(--bg);border:none;padding:10px 20px;border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:1px;cursor:pointer;text-transform:uppercase;width:100%}

/* COUNTDOWN RING */
.cdwn-ring{width:36px;height:36px;border-radius:50%;border:2px solid var(--b);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mu);flex-shrink:0}

/* PAGE TRANSITIONS */
.view{display:none}.view.active{display:block}

@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card{animation:slideUp .3s ease both}
.card:nth-child(1){animation-delay:.05s}.card:nth-child(2){animation-delay:.1s}
.card:nth-child(3){animation-delay:.15s}.card:nth-child(4){animation-delay:.2s}.card:nth-child(5){animation-delay:.25s}

/* CLOCK */
.clock{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mu)}
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div>
      <div class="topbar-logo">VP SCANNER</div>
      <div class="clock" id="clk"></div>
    </div>
    <div class="topbar-right">
      <div class="cdwn-ring" id="cdwnRing">—</div>
      <div class="live-pill wait" id="livePill"><span class="ldot"></span><span id="pillTxt">Manual</span></div>
      <button class="scan-fab" onclick="runScan()">SCAN</button>
    </div>
  </div>

  <!-- SESSION TABS -->
  <div class="sess-tabs">
    <div class="sess-tab" onclick="setSess('london')">🇬🇧 London</div>
    <div class="sess-tab on" id="sessNY" onclick="setSess('ny')">🇺🇸 New York</div>
    <div class="sess-tab" onclick="setSess('overlap')">⚡ Overlap</div>
  </div>

  <!-- SUMMARY BAR -->
  <div class="sumbar">
    <div class="sumitem"><div class="sum-lbl">Total</div><div class="sum-val c1">5</div></div>
    <div class="sumitem"><div class="sum-lbl">Strong</div><div class="sum-val c2" id="sStr">0</div></div>
    <div class="sumitem"><div class="sum-lbl">Bearish</div><div class="sum-val c3" id="sBr">0</div></div>
    <div class="sumitem"><div class="sum-lbl">Stacks</div><div class="sum-val c4" id="sStk">0</div></div>
  </div>

  <!-- MAIN SCROLL -->
  <div class="scroll" id="mainScroll">

    <!-- INSTALL BANNER -->
    <div class="install-banner" id="installBanner">
      <div class="install-title">📲 Install as App</div>
      <div class="install-text">Tap below to install VP Scanner on your home screen for instant access — works like a real Android app.</div>
      <button class="install-btn" id="installBtn" onclick="installApp()">Install VP Scanner</button>
    </div>

    <!-- SCANNER VIEW -->
    <div class="view active" id="viewScanner"></div>

    <!-- RANK VIEW -->
    <div class="view" id="viewRank"></div>

    <!-- INPUT VIEW -->
    <div class="view" id="viewInput">
      <div class="input-view" id="inputContent"></div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <div class="botnav">
    <button class="botnav-item on" id="navScanner" onclick="showView('scanner')">
      <span class="botnav-icon">📊</span>Scanner
    </button>
    <button class="botnav-item" id="navRank" onclick="showView('rank')">
      <span class="botnav-icon">🏆</span>Rankings
    </button>
    <button class="botnav-item" id="navInput" onclick="showView('input')">
      <span class="botnav-icon">✏️</span>Levels
    </button>
  </div>

</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const INST=[
  {id:'ger40', name:'GER40', full:'Germany 40 · DAX',       tier:1, auto:false},
  {id:'us30',  name:'US30',  full:'Dow Jones Industrial',   tier:1, auto:false},
  {id:'nas100',name:'NAS100',full:'Nasdaq 100',             tier:2, auto:false},
  {id:'gbp',   name:'GBPUSD',full:'British Pound / USD',    tier:2, auto:true,  pair:'GBPUSD'},
  {id:'eur',   name:'EURUSD',full:'Euro / US Dollar',       tier:2, auto:true,  pair:'EURUSD'},
];
const DEF={
  ger40: {poc:25255,asian:25300,mowo:24971,vah:25350,val:24650,mp:24705},
  us30:  {poc:48869,asian:48900,mowo:48782,vah:49450,val:48407,mp:47880},
  nas100:{poc:24958,asian:24976,mowo:24683,vah:25111,val:24400,mp:24458},
  gbp:   {poc:1.3493,asian:1.3493,mowo:1.3413,vah:1.3550,val:1.3200,mp:1.3286},
  eur:   {poc:1.1804,asian:1.1788,mowo:1.1771,vah:1.1900,val:1.1600,mp:1.1602},
};

let ST=JSON.parse(localStorage.getItem('vppwa')||'null')||Object.fromEntries(INST.map(i=>[i.id,{...DEF[i.id]}]));
let LV=JSON.parse(localStorage.getItem('vppwalive')||'{}');
let PV={};
let sess='ny';
let curView='scanner';
let cdv=30;
let cdt=null;
let deferredPrompt=null;

// ── PWA INSTALL ───────────────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('installBanner').classList.add('show');
});
function installApp(){
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.then(()=>{deferredPrompt=null;document.getElementById('installBanner').classList.remove('show');});}
}
window.addEventListener('appinstalled',()=>{document.getElementById('installBanner').classList.remove('show');});

// ── SERVICE WORKER ────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// ── FETCH FOREX ───────────────────────────────────────────────────────────
async function fetchForex(){
  setPill('fetch','Fetching...');
  const pairs=INST.filter(i=>i.auto);
  let ok=0;
  for(const inst of pairs){
    try{
      const r=await fetch(`https://www.freeforexapi.com/api/live?pairs=${inst.pair}`);
      const d=await r.json();
      if(d&&d.rates&&d.rates[inst.pair]){setLive(inst.id,d.rates[inst.pair].rate,'FreeForexAPI');ok++;}
    }catch(e){
      try{
        const b=inst.pair.slice(0,3);
        const r2=await fetch(`https://open.er-api.com/v6/latest/${b}`);
        const d2=await r2.json();
        const q=inst.pair.slice(3);
        if(d2&&d2.rates&&d2.rates[q]){setLive(inst.id,d2.rates[q],'ER-API');ok++;}
      }catch(e2){}
    }
  }
  if(ok>0){
    setPill('ok',`Live · ${new Date().toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'})}`);
    localStorage.setItem('vppwalive',JSON.stringify(LV));
    updateSum();renderRank();
  }else{
    setPill('err','Open file locally');
  }
  cdv=30;
}

function startCD(){
  if(cdt)clearInterval(cdt);cdv=30;
  cdt=setInterval(()=>{
    cdv--;
    const e=document.getElementById('cdwnRing');
    if(e)e.textContent=cdv+'s';
    if(cdv<=0){fetchForex();cdv=30;}
  },1000);
  fetchForex();
}

function setPill(type,txt){
  const p=document.getElementById('livePill');
  const t=document.getElementById('pillTxt');
  p.className=`live-pill ${type}`;
  t.textContent=txt;
}

function setLive(id,price,src){
  PV[id]=LV[id];
  LV[id]={p:parseFloat(price),t:Date.now(),src};
  updStrip(id);
}

function updStrip(id){
  const lp=LV[id];if(!lp)return;
  const p=lp.p,pr=PV[id],up=pr?p>=pr.p:true;
  const pEl=document.getElementById('pp'+id);
  const cEl=document.getElementById('pc'+id);
  const uEl=document.getElementById('pu'+id);
  const sEl=document.getElementById('ps'+id);
  const dEl=document.getElementById('pd'+id);
  if(pEl){pEl.textContent=fmt(p);pEl.className=`pval ${up?'up':'dn'} pfl`;setTimeout(()=>{if(pEl)pEl.className=`pval ${up?'up':'dn'}`;},500);}
  if(cEl&&pr){const d=p-pr.p,pct=((d/pr.p)*100).toFixed(4);cEl.textContent=`${d>=0?'+':''}${fmt(d)} (${d>=0?'+':''}${pct}%)`;cEl.className=`pchg ${d>=0?'up':'dn'}`;}
  if(uEl)uEl.textContent=new Date(lp.t).toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  if(sEl){sEl.textContent=lp.src;sEl.className='psrc live';}
  if(dEl){const d=ST[id];const po=parseFloat(d.poc),mo=parseFloat(d.mowo);const dp=po?Math.abs(p-po)/po*100:0,dm=mo?Math.abs(p-mo)/mo*100:0;dEl.innerHTML=dbars(dp,dm);}
}

function dbars(dp,dm){
  const pc=dp<0.3?'var(--yl)':dp<1?'var(--ac)':'var(--mu)';
  const mc=dm<0.3?'var(--yl)':dm<1?'var(--rd)':'var(--mu)';
  return`<div class="drow"><span class="dlbl">To POC</span><div class="dbar"><div class="dfill" style="width:${Math.max(3,Math.min(100,100-dp*20))}%;background:${pc}"></div></div><span class="dval" style="color:${pc}">${dp.toFixed(2)}%</span></div>
<div class="drow"><span class="dlbl">To MO/WO</span><div class="dbar"><div class="dfill" style="width:${Math.max(3,Math.min(100,100-dm*20))}%;background:${mc}"></div></div><span class="dval" style="color:${mc}">${dm.toFixed(2)}%</span></div>`;
}

// ── ANALYSIS ──────────────────────────────────────────────────────────────
function getP(id){
  if(LV[id]&&(Date.now()-LV[id].t)<600000)return LV[id].p;
  return parseFloat(ST[id].mp)||0;
}

function anal(id){
  const d=ST[id],p=getP(id);
  const po=parseFloat(d.poc)||0,as=parseFloat(d.asian)||0;
  const mo=parseFloat(d.mowo)||0,vh=parseFloat(d.vah)||0,vl=parseFloat(d.val)||0;
  if(!p||!po)return null;
  const abPOC=p>po,abMO=mo?p>mo:null,abAs=as?p>as:null;
  const abVAH=vh?p>vh:false,blVAL=vl?p<vl:false;
  const ps=as?Math.abs(po-as)/po<0.002:false;
  let bs=0;
  if(abPOC)bs++;else bs--;
  if(abMO!==null){if(abMO)bs++;else bs--;}
  if(abAs!==null){if(abAs)bs++;else bs--;}
  const bias=bs>=2?'bullish':bs<=-2?'bearish':'neutral';
  let score=0;
  if(Math.abs(p-po)/po>0.003)score+=2;
  if(abMO!==null&&abMO===abPOC)score+=2;else score+=1;
  if(ps)score+=2;if(abVAH||blVAL)score+=2;
  const dp=Math.abs(p-po)/po;
  if(dp<0.005)score+=2;else if(dp<0.015)score+=1;
  score=Math.min(10,score);
  let setup='WAIT',sc='wait',det='Price inside value area or signals unclear.';
  let eL=null,sL=null,t1=null,t2=null;
  if(bias==='bearish'&&!abPOC&&abMO===false){
    setup='SHORT';sc='short';eL=Math.min(po,mo||po);sL=Math.max(po,mo||po)*1.005;
    t1=vl||p*.99;t2=(vl||p*.99)*.99;det=`Retest of ${fmt(eL)} with bearish candle = SHORT.`;
  }else if(bias==='bullish'&&abPOC&&abMO===true){
    setup='LONG';sc='long';eL=Math.max(po,mo||po);sL=Math.min(po,mo||po)*.995;
    t1=vh||p*1.01;t2=(vh||p*1.01)*1.01;det=`Pullback to ${fmt(eL)} with bullish candle = LONG.`;
  }else if(blVAL&&abMO===false){
    setup='SHORT';sc='short';eL=mo||po;sL=(mo||po)*1.008;t1=(vl||p*.99)*.99;t2=(vl||p*.99)*.98;det=`Below VAL+MO/WO. Retest of ${fmt(eL)} = SHORT.`;
  }else if(abVAH&&abMO===true){
    setup='LONG';sc='long';eL=vh||po;sL=(vh||po)*.992;t1=(vh||po)*1.01;t2=(vh||po)*1.02;det=`Above VAH+MO/WO. Pullback to ${fmt(eL)} = LONG.`;
  }
  let rrr=null;
  if(eL&&sL&&t2){const r=Math.abs(eL-sL),rw=Math.abs(t2-eL);if(r>0)rrr=(rw/r).toFixed(1);}
  const dPOC=po?Math.abs(p-po)/po*100:0,dMOWO=mo?Math.abs(p-mo)/mo*100:0;
  return{p,po,as,mo,vh,vl,abPOC,abMO,abAs,abVAH,blVAL,pocStack:ps,bias,score,setup,sc,det,eL,sL,t1,t2,rrr,dPOC,dMOWO};
}

function fmt(v){
  if(!v&&v!==0)return'—';const n=parseFloat(v);
  if(n>=10000)return n.toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1});
  if(n>=100)return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  return n.toFixed(5).replace(/0+$/,'').replace(/\.$/,'');
}
const sc2=s=>s>=7?'h':s>=4?'m':'l';
const sc2c=s=>s>=7?'sh':s>=4?'sm':'sl';
const scCol=s=>s>=7?'var(--gr)':s>=4?'var(--yl)':'var(--rd)';
const scTxt=s=>s>=7?'STRONG':s>=4?'MODERATE':'WEAK';

// ── RENDER SCANNER ────────────────────────────────────────────────────────
function renderScanner(){
  const sorted=[...INST].sort((a,b)=>(anal(b.id)?.score||0)-(anal(a.id)?.score||0));
  document.getElementById('viewScanner').innerHTML=sorted.map(i=>rCard(i)).join('');
  INST.forEach(i=>{if(LV[i.id])updStrip(i.id);});
}

function rCard(inst){
  const d=ST[inst.id],a=anal(inst.id);
  const lp=LV[inst.id],pr=PV[inst.id];
  const hasLive=!!(lp&&(Date.now()-lp.t)<600000);
  const p=hasLive?lp.p:(parseFloat(d.mp)||0);
  const up=pr?p>=pr.p:true;
  const score=a?a.score:0,ps=a?a.pocStack:false,bias=a?a.bias:'neutral';
  return`<div class="card ${sc2c(score)} ${ps?'ps':''}">
<div class="chdr">
  <div>
    <div class="cname">${inst.name}<span style="font-size:10px;color:${inst.tier===1?'var(--ac)':'var(--mu)'};font-family:'IBM Plex Mono',monospace;margin-left:5px">T${inst.tier}</span>${ps?'<span class="stk">⚡STACK</span>':''}</div>
    <div class="cfull">${inst.full} · ${inst.auto?'<span style="color:var(--gr)">Auto</span>':'<span style="color:var(--mu)">Manual</span>'}</div>
    <div class="btg ${bias}">${bias==='bearish'?'▼':bias==='bullish'?'▲':'◆'} ${bias.toUpperCase()}</div>
  </div>
  <div style="text-align:center"><div class="ring ${sc2(score)}">${score}/10</div><div class="rlbl">Score</div></div>
</div>
<div class="pstrip">
  <div>
    <div class="plbl">${hasLive?'Live Price':'Current Price'}</div>
    <div id="pp${inst.id}" class="pval ${p?up?'up':'dn':'na'}">${p?fmt(p):inst.auto?'Fetching...':'Enter ↓'}</div>
    <div id="pc${inst.id}" class="pchg na">${hasLive&&pr?'':'Waiting...'}</div>
  </div>
  <div class="pmeta">
    <div id="pu${inst.id}" class="pupt">${hasLive?new Date(lp.t).toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit',second:'2-digit'}):'Not yet'}</div>
    <span id="ps${inst.id}" class="psrc ${hasLive?'live':'man'}">${hasLive?lp.src:'MANUAL'}</span>
  </div>
</div>
<div class="dsec" id="pd${inst.id}">${a&&p?dbars(a.dPOC,a.dMOWO):'<span style="font-size:9px;color:var(--mu)">Enter levels to see distances</span>'}</div>
<div class="scbsec">
  <div class="scblbl"><span>Setup Quality</span><span style="color:${scCol(score)}">${scTxt(score)}</span></div>
  <div class="scbar"><div class="scfill" style="width:${score*10}%;background:${scCol(score)}"></div></div>
</div>
<div class="chksec">
  <div class="chkrow"><span class="chklbl"><span class="chkdot" style="background:var(--ac)"></span>vs Fixed POC</span><span class="chkr ${a?(a.abPOC?'pass':'fail'):'nt'}">${a?(a.abPOC?'▲ ABOVE':'▼ BELOW'):'—'}</span></div>
  <div class="chkrow"><span class="chklbl"><span class="chkdot" style="background:var(--rd)"></span>vs MO/WO</span><span class="chkr ${a&&a.abMO!==null?(a.abMO?'pass':'fail'):'nt'}">${a&&a.abMO!==null?(a.abMO?'▲ ABOVE':'▼ BELOW'):'—'}</span></div>
  <div class="chkrow"><span class="chklbl"><span class="chkdot" style="background:var(--yl)"></span>POC Stack</span><span class="chkr ${ps?'stk':'nt'}">${ps?'⚡ YES':'—'}</span></div>
  <div class="chkrow"><span class="chklbl"><span class="chkdot" style="background:var(--mu)"></span>Value Area</span><span class="chkr ${a&&(a.abVAH||a.blVAL)?'pass':'nt'}">${a?(a.abVAH?'▲ VAH':a.blVAL?'▼ VAL':'◆ INSIDE'):'—'}</span></div>
</div>
<div class="setbox ${a?a.sc:'wait'}">
  <div class="settype">${a&&a.setup==='SHORT'?'▼ SHORT':a&&a.setup==='LONG'?'▲ LONG':'◆ WAIT'}</div>
  <div class="setdet">${a?a.det:'Enter VP levels to see setup.'}</div>
  ${a&&a.eL?`<div class="setlevs">
    <div class="slv"><span class="slvn">Entry</span><span class="slvv">${fmt(a.eL)}</span></div>
    <div class="slv"><span class="slvn">SL</span><span class="slvv" style="color:var(--rd)">${fmt(a.sL)}</span></div>
    <div class="slv"><span class="slvn">TP1</span><span class="slvv" style="color:var(--gr)">${fmt(a.t1)}</span></div>
    <div class="slv"><span class="slvn">TP2</span><span class="slvv" style="color:var(--gr)">${fmt(a.t2)}</span></div>
    ${a.rrr?`<div class="slv"><span class="slvn">RRR</span><span class="slvv" style="color:${parseFloat(a.rrr)>=3?'var(--gr)':'var(--rd)'}">1:${a.rrr}</span></div>`:''}
  </div>`:''}
</div>
<button class="rcalc" onclick="save();renderScanner()">↻ Recalculate</button>
</div>`;
}

// ── RENDER RANK ───────────────────────────────────────────────────────────
function renderRank(){
  const sorted=[...INST].sort((a,b)=>(anal(b.id)?.score||0)-(anal(a.id)?.score||0));
  const rnks=['g','s','b','x','x'];
  document.getElementById('viewRank').innerHTML=`<div style="padding:12px">
    <div class="rank-card">${sorted.map((inst,idx)=>{
      const a=anal(inst.id);const lp=LV[inst.id];
      const hasLive=!!(lp&&(Date.now()-lp.t)<600000);
      const p=hasLive?fmt(lp.p):(ST[inst.id].mp?fmt(ST[inst.id].mp):'—');
      const pri=a&&a.score>=7?'🔥 TRADE NOW':a&&a.score>=4?'👀 MONITOR':'⏳ WAIT';
      const bias=a?a.bias:'neutral';
      const setup=a?a.setup:'WAIT';
      return`<div class="rank-row">
        <div class="rnum ${rnks[idx]}">${idx+1}</div>
        <div class="rank-info">
          <div class="rank-name">${inst.name} <span style="font-size:10px;color:var(--mu);font-family:'IBM Plex Mono',monospace">T${inst.tier}</span></div>
          <div class="rank-sub">
            <span class="btg ${bias}" style="font-size:8px">${bias.toUpperCase()}</span>
            &nbsp;<span style="color:${setup==='SHORT'?'var(--rd)':setup==='LONG'?'var(--gr)':'var(--mu)'}">${setup}</span>
            ${a&&a.pocStack?'&nbsp;<span style="color:var(--yl)">⚡STACK</span>':''}
          </div>
        </div>
        <div class="rank-right">
          <div class="rank-score" style="color:${scCol(a?a.score:0)}">${a?a.score:0}/10</div>
          <div class="rank-pri">${pri}</div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:${hasLive?'var(--gr)':'var(--mu)'}">${p}</div>
        </div>
      </div>`;
    }).join('')}</div>
  </div>`;
}

// ── RENDER INPUT ──────────────────────────────────────────────────────────
function renderInput(){
  document.getElementById('inputContent').innerHTML=INST.map(inst=>{
    const d=ST[inst.id];
    return`<div class="input-section">
      <div class="input-hdr">${inst.name} <span style="font-size:11px;color:${inst.tier===1?'var(--ac)':'var(--mu)'}">T${inst.tier}</span> · ${inst.auto?'<span style="color:var(--gr);font-size:11px">Auto Price</span>':'<span style="color:var(--mu);font-size:11px">Manual Price</span>'}</div>
      <div class="input-body">
        <div class="input-row">
          <div class="levgp"><span class="levlbl" style="color:var(--ac)">Fixed Range POC</span><input class="levinp poc" type="number" step="any" inputmode="decimal" value="${d.poc||''}" onchange="upd('${inst.id}','poc',this.value)" placeholder="POC"></div>
          <div class="levgp"><span class="levlbl" style="color:var(--yl)">Asian POC</span><input class="levinp asn" type="number" step="any" inputmode="decimal" value="${d.asian||''}" onchange="upd('${inst.id}','asian',this.value)" placeholder="Asian POC"></div>
        </div>
        <div class="input-row">
          <div class="levgp"><span class="levlbl" style="color:var(--rd)">MO / WO</span><input class="levinp mow" type="number" step="any" inputmode="decimal" value="${d.mowo||''}" onchange="upd('${inst.id}','mowo',this.value)" placeholder="MO/WO"></div>
          <div class="levgp"><span class="levlbl">VAH</span><input class="levinp" type="number" step="any" inputmode="decimal" value="${d.vah||''}" onchange="upd('${inst.id}','vah',this.value)" placeholder="VAH"></div>
        </div>
        <div class="input-row">
          <div class="levgp"><span class="levlbl">VAL</span><input class="levinp" type="number" step="any" inputmode="decimal" value="${d.val||''}" onchange="upd('${inst.id}','val',this.value)" placeholder="VAL"></div>
          ${inst.auto?`<div class="levgp"><span class="levlbl">Session POC</span><input class="levinp" type="number" step="any" inputmode="decimal" value="${d.sp||''}" onchange="upd('${inst.id}','sp',this.value)" placeholder="Session POC"></div>`:`<div class="levgp"><span class="levlbl" style="color:var(--gr)">▶ Current Price</span><input class="levinp prc" type="number" step="any" inputmode="decimal" value="${d.mp||''}" onchange="upd('${inst.id}','mp',this.value)" placeholder="Price"></div>`}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── VIEWS ─────────────────────────────────────────────────────────────────
function showView(v){
  curView=v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.botnav-item').forEach(el=>el.classList.remove('on'));
  document.getElementById('view'+v.charAt(0).toUpperCase()+v.slice(1)).classList.add('active');
  document.getElementById('nav'+v.charAt(0).toUpperCase()+v.slice(1)).classList.add('on');
  document.getElementById('mainScroll').scrollTop=0;
  if(v==='rank')renderRank();
  if(v==='input')renderInput();
}

function setSess(s){
  sess=s;
  document.querySelectorAll('.sess-tab').forEach(t=>t.classList.remove('on'));
  event.target.classList.add('on');
}

function updateSum(){
  const aa=INST.map(i=>anal(i.id));
  document.getElementById('sStr').textContent=aa.filter(a=>a&&a.score>=7).length;
  document.getElementById('sBr').textContent=aa.filter(a=>a&&a.bias==='bearish').length;
  document.getElementById('sStk').textContent=aa.filter(a=>a&&a.pocStack).length;
}

function upd(id,f,v){ST[id][f]=parseFloat(v)||v;save();}
function save(){localStorage.setItem('vppwa',JSON.stringify(ST));}

function runScan(){
  save();renderScanner();updateSum();fetchForex();
  showView('scanner');
}

function clock(){
  const n=new Date();
  document.getElementById('clk').textContent=n.toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+' RSA';
}

// ── INIT ──────────────────────────────────────────────────────────────────
renderScanner();updateSum();clock();
setInterval(clock,1000);
startCD();
</script>
